# Actualiza el dashboard AQD cada hora entre 6:00 y 19:00 hora Colombia
# (UTC-5) y lo publica en GitHub Pages. También se puede lanzar a mano
# desde la pestaña Actions ("Run workflow").
name: Actualizar dashboard

on:
  schedule:
    - cron: "0 11-23 * * *"   # 6:00–18:00 Colombia, cada hora
    - cron: "0 0 * * *"       # 19:00 Colombia
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: actualizar-dashboard
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install --quiet pandas playwright
          python -m playwright install --with-deps chromium

      - name: Extraer Bitácora (FLT, CBN, FRM)
        env:
          AQD_USUARIO: ${{ secrets.AQD_USUARIO }}
          AQD_CLAVE: ${{ secrets.AQD_CLAVE }}
        run: python extraer_cloud.py

      - name: Extraer Planner (sesión virtual de Microsoft)
        env:
          # la sesión puede venir partida en hasta 3 secretos (48 KB c/u);
          # aquí se reúnen de nuevo
          MS_SESION: ${{ secrets.MS_SESION }}${{ secrets.MS_SESION_2 }}${{ secrets.MS_SESION_3 }}
        run: python extraer_planner_cloud.py

      - name: Generar reporte HTML
        run: |
          python preparar_datos.py
          python comparar_bitacora_planner.py

      - name: Publicar (reporte y datos frescos a este mismo repo)
        run: |
          cp reporte_bitacora_vs_tasks.html index.html
          git config user.name "AQD Bot"
          git config user.email "aqd-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add index.html bitacora_*.csv planner_raw.txt
          git commit -m "Actualización $(TZ=America/Bogota date '+%Y-%m-%d %H:%M') COT" || echo "sin cambios"
          git push

      - name: Avisar si la sesión de Planner expiró
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITULO="⚠️ La sesión de Planner expiró — hay que renovarla"
          ABIERTO=$(gh issue list -R "$GITHUB_REPOSITORY" --state open --search "$TITULO in:title" --json number --jq '.[0].number // empty')
          CUERPO=$'La actualización automática no pudo entrar a Planner: la sesión de Microsoft expiró. Los datos de Planner quedan congelados en su última foto; Bitácora sigue actualizándose normal cada hora.\n\nPara renovar (2 minutos): en tu Mac, doble clic en "Actualizar Reporte.command" e inicia sesión en Microsoft cuando lo pida. Este aviso se cierra solo cuando la sesión quede activa.'
          if [ -f _planner_expirado.flag ]; then
            if [ -z "$ABIERTO" ]; then
              gh issue create -R "$GITHUB_REPOSITORY" --title "$TITULO" --body "$CUERPO"
              echo "Issue de aviso creado."
            else
              echo "Ya hay un aviso abierto (#$ABIERTO); no se duplica."
            fi
          else
            if [ -n "$ABIERTO" ]; then
              gh issue close "$ABIERTO" -R "$GITHUB_REPOSITORY" --comment "Sesión de Planner renovada, cerrado automáticamente."
              echo "Aviso #$ABIERTO cerrado."
            fi
          fi
